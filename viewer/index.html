<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>AITuber Radio — Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* 背景レイヤー */
    #bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('default_bg.jpeg');
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    #bg-layer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.15) 0%,
          rgba(0, 0, 0, 0.05) 40%,
          rgba(0, 0, 0, 0.3) 80%,
          rgba(0, 0, 0, 0.7) 100%);
    }

    /* 3D キャンバス（透明） */
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* テキストボックス（字幕） */
    #subtitle-box {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 1000px;
      min-height: 70px;
      padding: 20px 32px;
      background: rgba(10, 10, 26, 0.88);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 28px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      z-index: 10;
      display: none;
      animation: subtitleFadeIn 0.3s ease;
    }

    #subtitle-box.visible {
      display: block;
    }

    #subtitle-title {
      font-size: 22px;
      color: #e94560;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    #subtitle-text {
      color: #e8e8e8;
    }

    @keyframes subtitleFadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ステータス */
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
    }

    /* ドロップゾーン */
    #drop-zone {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      color: white;
      font-size: 24px;
    }

    /* 操作ヒント */
    #controls-hint {
      position: fixed;
      bottom: 8px;
      right: 12px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 10px;
      z-index: 5;
      pointer-events: none;
    }

    /* ジングルオーバーレイ */
    #jingle-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 50;
      display: none;
      justify-content: center;
      align-items: center;
      background: #000;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #jingle-overlay.visible {
      display: flex;
      opacity: 1;
    }

    #jingle-overlay.fade-out {
      opacity: 0;
    }

    #jingle-overlay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* ローカルコメントボックス */
    #local-comment-box {
      position: fixed;
      bottom: 130px;
      right: 20px;
      width: 320px;
      max-height: 400px;
      background: rgba(10, 10, 30, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 14px;
      z-index: 80;
      display: none;
      flex-direction: column;
      font-family: 'Noto Sans JP', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #local-comment-box.visible { display: flex; }
    #local-comment-header {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #e94560;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #local-comment-header button {
      background: none;
      border: none;
      color: #888;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
    }
    #local-comment-header button:hover { color: #e94560; }
    #local-comment-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      max-height: 250px;
      font-size: 13px;
      line-height: 1.5;
      color: #ccc;
    }
    .local-msg { margin-bottom: 6px; }
    .local-msg .author { color: #e94560; font-weight: 700; font-size: 11px; }
    .local-msg .text { color: #ddd; }
    .local-msg.reply .author { color: #5ea8e9; }
    .local-msg.reply .text { color: #b0c8e8; }
    #local-comment-input-area {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    #localCommentInput {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #eee;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    #localCommentInput:focus { border-color: #e94560; }
    #localCommentInput::placeholder { color: #666; }
    #localCommentSend {
      background: #e94560;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #localCommentSend:hover { background: #c73850; }
  </style>
</head>

<body>
  <div id="bg-layer"></div>
  <canvas id="canvas"></canvas>

  <div id="subtitle-box">
    <div id="subtitle-title"></div>
    <div id="subtitle-text"></div>
  </div>

  <div id="status">Loading...</div>
  <button id="recordBtn" style="position:fixed;top:8px;right:12px;z-index:100;padding:6px 14px;background:rgba(30,30,50,0.85);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px)">📹 録画</button>
  <div id="controls-hint">左ドラッグ: 回転 ／ 右ドラッグ: 移動 ／ ホイール: ズーム</div>
  <div id="drop-zone">VRM / 台本 / 背景画像 / PNG立ち絵 をドロップ</div>
  <div id="jingle-overlay"><img id="jingle-image" src="" alt=""></div>

  <!-- PNGTuber レイヤー -->
  <div id="pngtuber-layer" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;display:none;pointer-events:none">
    <img id="pngtuber-idle" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);max-height:90vh;max-width:90vw;object-fit:contain" src="" alt="">
    <img id="pngtuber-talk" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);max-height:90vh;max-width:90vw;object-fit:contain;display:none" src="" alt="">
    <img id="pngtuber-blink" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);max-height:90vh;max-width:90vw;object-fit:contain;display:none" src="" alt="">
  </div>

  <!-- ローカルコメントボックス -->
  <div id="local-comment-box">
    <div id="local-comment-header">
      💬 チャット
      <button id="localCommentClose" title="閉じる">✕</button>
    </div>
    <div id="local-comment-log"></div>
    <div id="local-comment-input-area">
      <input type="text" id="localCommentInput" placeholder="コメントを入力..." autocomplete="off">
      <button id="localCommentSend">送信</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".vrm" style="display:none">
  <input type="file" id="bgInput" accept="image/*" style="display:none">
  <input type="file" id="scriptInput" accept=".md,.txt" style="display:none">
  <input type="file" id="folderInput" webkitdirectory style="display:none">
  <input type="file" id="readingsFolderInput" webkitdirectory style="display:none">
  <input type="file" id="mediaFolderInput" webkitdirectory style="display:none">

  <script type="module" src="viewer.bundle.js"></script>
</body>

</html>
